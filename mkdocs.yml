site_name: Vakho10
site_url: https://vakho10.github.io/vakho10/
site_author: Vakho10
site_description: >-
  Personal portfolio and blog of Vakho10 — software developer.

# Repository
repo_name: vakho10/vakho10
repo_url: https://github.com/vakho10/vakho10

# Copyright
copyright: Copyright &copy; 2026 Vakho10

theme:
  name: material
  icon:
    logo: material/code-tags
  features:
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

# Plugins
plugins:
  - search
  - blog:
      blog_dir: blog
      post_url_format: "{slug}"
      post_excerpt: optional
      pagination_per_page: 5
      archive: true
      categories: true

# Navigation
nav:
  - Home: index.md
  - Blog:
      - blog/index.md

# Extra styling
extra_css:
  - stylesheets/extra.css

# Social links (shown in footer)
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vakho10
      name: GitHub
    - icon: fontawesome/solid/envelope
      link: mailto:vakho10@gmail.com
      name: Email

# Markdown extensions
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
